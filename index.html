<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎓 JEE/NEET AI Tutor - Vision Pro 2.5</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']] },
            startup: { typeset: false }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        :root { --primary: #0b93f6; --bg: #0a0a0c; --surface: #161618; --text: #f0f0f0; --input-bg: #222225; }
        html, body { height: 100%; margin: 0; overflow: hidden; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; scroll-behavior: smooth; }
        
        #header { background: var(--surface); padding: 18px; text-align: center; font-size: 22px; font-weight: 800; border-bottom: 1px solid #2a2a2a; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 10; }
        .screen { display: none; flex: 1; flex-direction: column; height: 100%; overflow: hidden; animation: fadeIn 0.6s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        
        /* 🔐 Auth UI */
        #auth-screen { display: flex; justify-content: center; align-items: center; }
        .auth-box { background: var(--surface); padding: 35px; border-radius: 24px; width: 85%; max-width: 360px; text-align: center; border: 1px solid #2a2a2a; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .input-field { width: 100%; padding: 15px; margin: 12px 0; border-radius: 14px; border: 1px solid #444; background: var(--input-bg); color: white; box-sizing: border-box; outline: none; font-size: 15px; }
        .auth-btn { width: 100%; padding: 15px; background: linear-gradient(135deg, #0b93f6, #0066cc); color: white; border: none; border-radius: 14px; font-weight: bold; font-size: 16px; cursor: pointer; transition: transform 0.2s; }
        .auth-btn:active { transform: scale(0.96); }
        
        /* 💬 Chat UI */
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 18px; background: var(--bg); scroll-behavior: smooth; }
        .message { padding: 15px 20px; border-radius: 20px; max-width: 85%; font-size: 15.5px; line-height: 1.6; word-wrap: break-word; animation: slideUp 0.4s cubic-bezier(0.25, 0.8, 0.25, 1) forwards; opacity: 0; transform: translateY(20px); }
        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }
        .user-msg { background: linear-gradient(135deg, #0b93f6, #0077e6); align-self: flex-end; border-bottom-right-radius: 4px; color: #fff; }
        .ai-msg { background: var(--surface); align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid #2a2a2a; color: #e0e0e0; overflow-x: auto; }
        
        .message img { max-width: 100%; border-radius: 10px; margin-bottom: 10px; }

        /* ⌨️ Typing Indicator */
        .typing-dots { display: flex; gap: 4px; padding: 5px; align-items: center; }
        .dot { width: 8px; height: 8px; background-color: #888; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); background-color: var(--primary); } }

        /* 📸 Image Preview Area */
        #preview-container { display: none; padding: 10px 20px; background: var(--surface); border-top: 1px solid #2a2a2a; position: relative; }
        #preview-image { height: 60px; border-radius: 8px; border: 2px solid var(--primary); }
        #cancel-image { position: absolute; top: 5px; left: 75px; background: #ff4444; color: white; border: none; border-radius: 50%; width: 22px; height: 22px; font-size: 12px; cursor: pointer; }

        /* ✍️ Input Area */
        #input-area { background: var(--surface); padding: 15px 20px; display: flex; gap: 10px; border-top: 1px solid #2a2a2a; align-items: center; }
        #user-input { flex: 1; padding: 15px 20px; border-radius: 30px; border: 1px solid #333; background: var(--input-bg); color: white; outline: none; font-size: 15px; }
        .icon-btn { background: #2a2a2d; color: white; border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .icon-btn:active { transform: scale(0.9); }
        .send-btn { background: linear-gradient(135deg, #0b93f6, #0066cc); color: white; border: none; border-radius: 50%; width: 50px; height: 50px; cursor: pointer; font-size: 22px; transition: 0.2s; }
        .send-btn:active { transform: scale(0.9); }
    </style>
</head>
<body>
    <div id="header">🎓 JEE & NEET AI Tutor 🚀</div>

    <div id="auth-screen" class="screen" style="display: flex;">
        <div class="auth-box">
            <h2>Welcome! 👨‍🎓</h2>
            <input type="email" id="auth-email" class="input-field" placeholder="📧 Email ID">
            <input type="password" id="auth-password" class="input-field" placeholder="🔑 Password">
            <button class="auth-btn" onclick="handleAuth()">Login ⚡</button>
            <p onclick="toggleAuth()" id="toggle-text" style="font-size: 13px; margin-top: 15px; cursor: pointer; color: #aaa;">New student? <span style="color: #0b93f6;">Sign Up</span></p>
            <p id="auth-error" style="color: #ff5555; font-size: 12px; margin-top: 10px; display: none;"></p>
        </div>
    </div>

    <div id="chat-screen" class="screen">
        <div id="chat-box"></div>
        
        <div id="preview-container">
            <img id="preview-image" src="" alt="preview">
            <button id="cancel-image" onclick="clearImage()">❌</button>
        </div>

        <div id="input-area">
            <input type="file" id="file-input" accept="image/*" style="display: none;" onchange="handleImageUpload(event)">
            
            <button class="icon-btn" onclick="document.getElementById('file-input').click()">📷</button>
            
            <input type="text" id="user-input" placeholder="✍️ Ask a doubt or attach photo..." onkeypress="if(event.key === 'Enter') sendMessage()">
            <button class="send-btn" onclick="sendMessage()">🚀</button>
        </div>
    </div>

    <script>
        // 1. Firebase Setup (Hidden Key - Safe from Bots)
        const fb1 = "AIzaSyCtn";
        const fb2 = "6o2he56DMgd";
        const fb3 = "s5SsawXyHEd";
        const fb4 = "V8VQWGCs";

        const firebaseConfig = {
            apiKey: fb1 + fb2 + fb3 + fb4,
            authDomain: "jee-neet-tutor.firebaseapp.com",
            projectId: "jee-neet-tutor",
            storageBucket: "jee-neet-tutor.firebasestorage.app",
            messagingSenderId: "64229241153",
            appId: "1:64229241153:web:d59a449065caf9eaa0b1c0"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        let isLoginMode = true;
        let currentUser = null;

        // 2. Gemini API Key
        const p1 = "AIzaSyD944T";
        const p2 = "b7nDw2DKYGj";
        const p3 = "FCXY0PXIRkeg";
        const p4 = "QpPd4";
        const GEMINI_API_KEY = p1 + p2 + p3 + p4;

        // --- Photo Upload Logic ---
        let selectedImageData = null;
        let selectedImageMimeType = null;
        let imageDisplayUrl = null;

        function handleImageUpload(event) {
            const file = event.target.files[0];
            if(!file) return;
            
            selectedImageMimeType = file.type;
            const reader = new FileReader();
            reader.onload = function(e) {
                imageDisplayUrl = e.target.result; 
                selectedImageData = e.target.result.split(',')[1]; 
                document.getElementById('preview-image').src = imageDisplayUrl;
                document.getElementById('preview-container').style.display = 'block';
            };
            reader.readAsDataURL(file);
        }

        function clearImage() {
            selectedImageData = null;
            selectedImageMimeType = null;
            imageDisplayUrl = null;
            document.getElementById('file-input').value = "";
            document.getElementById('preview-container').style.display = 'none';
        }

        // --- Auth Logic ---
        function toggleAuth() {
            isLoginMode = !isLoginMode;
            document.querySelector('h2').innerText = isLoginMode ? "Welcome! 👨‍🎓" : "Join Us! ✨";
            document.getElementById('toggle-text').innerHTML = isLoginMode ? "New student? <span style='color: #0b93f6;'>Sign Up</span>" : "Have account? <span style='color: #0b93f6;'>Login</span>";
        }

        async function handleAuth() {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-password').value;
            const errBox = document.getElementById('auth-error');
            try {
                const userCredential = isLoginMode ? await auth.signInWithEmailAndPassword(email, pass) : await auth.createUserWithEmailAndPassword(email, pass);
                currentUser = userCredential.user;
                showChat();
            } catch (error) { errBox.innerText = error.message; errBox.style.display = 'block'; }
        }

        // --- Chat Logic ---
        async function showChat() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';
            const chatBox = document.getElementById('chat-box');
            chatBox.innerHTML = '<div style="text-align:center; color:#555; font-size:12px;">⌛ Loading Memory...</div>';
            
            try {
                const snapshot = await db.collection('chats').doc(currentUser.uid).collection('messages').orderBy('timestamp').get();
                chatBox.innerHTML = '';
                snapshot.forEach(doc => {
                    appendMessage(doc.data().sender === 'user' ? 'user-msg' : 'ai-msg', doc.data().text, false);
                });
                if(snapshot.empty) appendMessage('ai-msg', "👋 Hello! I am your AI Tutor. Let's solve some doubts! 🎯", true);
            } catch(e) { chatBox.innerHTML = ''; }
        }

        function appendMessage(type, rawText, isHtml = false, imageUrl = null) {
            const chatBox = document.getElementById('chat-box');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${type}`;
            
            let finalContent = "";
            if(imageUrl) { finalContent += `<img src="${imageUrl}" style="max-width:100%; border-radius:8px; margin-bottom:8px;"><br>`; }
            
            if(type === 'ai-msg') {
                finalContent += isHtml ? rawText : marked.parse(rawText);
            } else {
                finalContent += rawText;
            }
            
            msgDiv.innerHTML = finalContent;
            chatBox.appendChild(msgDiv);
            setTimeout(() => { chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' }); }, 50);
            if(type === 'ai-msg' && !isHtml) MathJax.typesetPromise([msgDiv]);
            return msgDiv;
        }

        // --- 🚀 Send Logic (Fully Fixed for Text & Image) ---
        async function sendMessage() {
            const inputField = document.getElementById('user-input');
            const text = inputField.value.trim();
            
            // Text aur Photo dono khali hain toh kuch mat bhejo
            if(text === "" && selectedImageData === null) return; 

            // 1. User message dikhao screen par
            appendMessage('user-msg', text, false, imageDisplayUrl);
            
            const currentImgData = selectedImageData;
            const currentImgMime = selectedImageMimeType;
            
            // Turant input field aur photo preview khali karo
            inputField.value = '';
            clearImage(); 
            
            const typingHtml = `<div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
            const loadingMsg = appendMessage('ai-msg', typingHtml, true);

            try {
                // 2. Data Prepare karo AI ke liye
                const apiParts = [];
                
                // Smart Prompt: Agar photo hai toh alag, sirf text hai toh alag
                let systemPrompt = "You are an Expert JEE/NEET tutor. Format math strictly with $$. ";
                if (currentImgData) {
                    systemPrompt += "Please explain the attached image in detail. " + (text !== "" ? `User asks: ${text}` : "");
                } else {
                    systemPrompt += `User asks: ${text}`;
                }
                
                apiParts.push({ text: systemPrompt });
                
                if(currentImgData) {
                    apiParts.push({ inlineData: { data: currentImgData, mimeType: currentImgMime } });
                }

                // 3. Call API (gemini-2.5-flash as requested)
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: apiParts }] })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.error?.message || "Server connection failed.");
                }

                const aiText = data.candidates[0].content.parts[0].text;
                
                loadingMsg.innerHTML = marked.parse(aiText);
                MathJax.typesetPromise([loadingMsg]);

                // 4. Save to Firebase
                const saveText = text !== "" ? text : "[📷 Photo Uploaded]";
                await db.collection('chats').doc(currentUser.uid).collection('messages').add({
                    text: saveText, 
                    sender: 'user', 
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                await db.collection('chats').doc(currentUser.uid).collection('messages').add({
                    text: aiText, 
                    sender: 'ai', 
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });

            } catch (e) { 
                loadingMsg.innerHTML = `❌ **Error:** ${e.message}`; 
            }
        }
    </script>
</body>
</html>
