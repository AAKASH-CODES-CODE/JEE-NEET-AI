<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎓 JEE/NEET AI Tutor - Master Pro Max</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        window.MathJax = { tex: { inlineMath: [['$', '$']], displayMath: [['$$', '$$']] }, startup: { typeset: false } };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        :root { --primary: #0b93f6; --bg: #0a0a0c; --surface: #161618; --text: #f0f0f0; --input-bg: #222225; }
        html, body { height: 100%; margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; overflow: hidden;}
        
        #header { background: var(--surface); padding: 12px 18px; border-bottom: 1px solid #2a2a2a; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .btn-small { padding: 8px 14px; border-radius: 10px; border: none; font-size: 12px; cursor: pointer; font-weight: bold; color: white; display: none; transition: 0.3s; }
        .history-btn { background: #333; }
        .settings-top-btn { background: transparent; border: none; font-size: 22px; cursor: pointer; color: white; display: none; padding: 0; transition: 0.2s;}
        .settings-top-btn:active { transform: rotate(45deg); }

        #sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: var(--surface); z-index: 1000; transition: 0.3s; border-right: 1px solid #2a2a2a; display: flex; flex-direction: column; }
        #sidebar.open { left: 0; }
        .sidebar-header { padding: 20px; border-bottom: 1px solid #2a2a2a; display: flex; justify-content: space-between; align-items: center; }
        .history-list { flex: 1; overflow-y: auto; padding: 10px; }
        .history-item { padding: 12px; border-radius: 12px; background: #222; margin-bottom: 10px; font-size: 13px; cursor: pointer; display: flex; justify-content: space-between; border: 1px solid transparent; }
        .history-item:hover { border-color: var(--primary); }

        .screen { display: none; flex: 1; flex-direction: column; overflow: hidden; position: relative; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        .message { padding: 14px 18px; border-radius: 18px; max-width: 85%; font-size: 15px; line-height: 1.6; word-wrap: break-word; animation: slideUp 0.3s forwards; }
        @keyframes slideUp { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }
        .user-msg { background: var(--primary); align-self: flex-end; border-bottom-right-radius: 4px; }
        .ai-msg { background: #222; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid #333; }

        /* 🔍 Google Auto-Suggest Styling */
        .suggestions-box { display: none; position: absolute; bottom: 85px; left: 15px; right: 15px; background: #1c1c1e; border: 1px solid #333; border-radius: 15px; max-height: 200px; overflow-y: auto; z-index: 50; box-shadow: 0 -5px 15px rgba(0,0,0,0.5); }
        .suggestion-item { padding: 12px 15px; border-bottom: 1px solid #2a2a2a; color: #ddd; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .suggestion-item:last-child { border-bottom: none; }
        .suggestion-item:hover { background: #2c2c2e; color: var(--primary); }

        #input-area { background: var(--surface); padding: 15px; display: flex; gap: 10px; border-top: 1px solid #2a2a2a; align-items: center; z-index: 60;}
        #user-input { flex: 1; padding: 14px 20px; border-radius: 30px; border: 1px solid #333; background: var(--input-bg); color: white; outline: none; transition: 0.3s; }
        .send-btn { background: var(--primary); border: none; border-radius: 50%; width: 48px; height: 48px; color: white; cursor: pointer; font-size: 20px; display: flex; justify-content: center; align-items: center; transition: 0.3s;}
        
        .mic-btn { background: #333; border: none; border-radius: 50%; width: 48px; height: 48px; color: white; cursor: pointer; font-size: 18px; display: flex; justify-content: center; align-items: center; transition: 0.3s; }
        .mic-btn.recording { background: #ff4444; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(255, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 68, 68, 0); } }

        /* 🚀 Top Right Dropdown Menu */
        #menu-popup { position: fixed; top: -400px; right: 15px; width: 280px; background: #1c1c1e; border-radius: 15px; padding: 20px; z-index: 1001; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); border: 1px solid #333; box-shadow: 0 5px 25px rgba(0,0,0,0.5); opacity: 0;}
        #menu-popup.active { top: 65px; opacity: 1;}
        .menu-title { font-weight: bold; color: var(--primary); margin-bottom: 15px; display: block; border-bottom: 1px solid #333; padding-bottom: 8px; }
        .menu-item { background: #2c2c2e; padding: 12px; border-radius: 12px; margin-bottom: 12px; font-size: 13px; border: 1px solid #3a3a3c; }
        .logout-menu-btn { width: 100%; padding: 12px; background: #ff4444; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 5px; }

        #auth-screen { justify-content: center; align-items: center; display: flex; }
        .auth-box { background: var(--surface); padding: 30px; border-radius: 24px; width: 85%; max-width: 360px; text-align: center; border: 1px solid #2a2a2a; }
        .input-field { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 1px solid #444; background: var(--input-bg); color: white; box-sizing: border-box; outline: none; }
        .auth-btn { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: bold; margin-top: 10px; cursor: pointer; }

        .help-section { margin-top: 25px; padding-top: 15px; border-top: 1px solid #333; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .help-link { text-decoration: none; display: flex; align-items: center; gap: 8px; background: #242426; padding: 10px 20px; border-radius: 14px; border: 1px solid #444; transition: 0.3s;}
        .help-link:active { transform: scale(0.95); background: #2a2a2c; }
        .tg-logo { width: 20px; height: 20px; }

        .typing-dots { display: flex; gap: 4px; padding: 5px; }
        .dot { width: 8px; height: 8px; background-color: var(--primary); border-radius: 50%; animation: bounce 1.4s infinite; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 900; }
        #menu-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 950; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="sidebar-header"><strong>📂 History</strong><button class="btn-small history-btn" style="display:block;" onclick="toggleSidebar()">Close</button></div>
        <button class="auth-btn" style="margin: 10px; width: auto;" onclick="startNewChat()">+ New Chat</button>
        <div id="history-list" class="history-list"></div>
    </div>
    <div id="overlay" onclick="toggleSidebar()"></div>
    <div id="menu-overlay" onclick="toggleMenu()"></div>

    <div id="header">
        <button id="btn-history" class="btn-small history-btn" onclick="toggleSidebar()">📂 History</button>
        <span style="font-weight: 800;">🎓 AI Tutor 🚀</span>
        <button id="btn-settings" class="settings-top-btn" onclick="toggleMenu()">⚙️</button>
    </div>

    <div id="menu-popup">
        <span class="menu-title">ℹ️ About This App</span>
        <div class="menu-item">
            <b>Developer:</b> Aakash<br>
            <b>Motive:</b> To provide JEE/NEET aspirants with clear and accurate doubt resolution. 🎯
        </div>
        <span class="menu-title">🆘 Support & Help</span>
        <div class="menu-item" style="display: flex; align-items: center; gap: 10px;">
            <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" style="width:20px;">
            <a href="https://t.me/JEE_NEET_AI_tutor" target="_blank" style="color: #0088cc; text-decoration: none; font-weight: bold;">Join Telegram Support</a>
        </div>
        <button class="logout-menu-btn" onclick="handleLogout()">Logout Account 🚪</button>
    </div>

    <div id="auth-screen" class="screen">
        <div class="auth-box">
            <h2 id="auth-title">Welcome Back! 👨‍🎓</h2>
            <input type="text" id="auth-name" class="input-field" placeholder="👤 Full Name" style="display: none;">
            <input type="tel" id="auth-phone" class="input-field" placeholder="📱 Phone Number" style="display: none;">
            <input type="email" id="auth-email" class="input-field" placeholder="📧 Email ID">
            <input type="password" id="auth-password" class="input-field" placeholder="🔑 Password">
            <button id="auth-submit-btn" class="auth-btn" onclick="handleAuth()">Login ⚡</button>
            <p onclick="toggleAuthMode()" id="toggle-text" style="font-size: 13px; margin-top: 15px; cursor: pointer; color: #aaa;">New student? <span style="color: var(--primary);">Sign Up</span></p>
            
            <div class="help-section">
                <span style="font-size: 11px; color: #666;">Need Help?</span>
                <a href="https://t.me/JEE_NEET_AI_tutor" target="_blank" class="help-link">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" class="tg-logo">
                    <span style="color: #0088cc; font-weight: bold; font-size: 14px;">Help Me</span>
                </a>
            </div>
            <p id="auth-error" style="font-size: 12px; display: none; margin-top:15px; color: #ff4444;"></p>
        </div>
    </div>

    <div id="chat-screen" class="screen">
        <div id="chat-box"></div>
        
        <div id="suggestions-box" class="suggestions-box"></div>

        <div id="input-area">
            <button id="mic-btn" class="mic-btn" onclick="toggleMic()">🎤</button>
            <input type="text" id="user-input" placeholder="✍️ Ask a doubt..." onkeypress="if(event.key === 'Enter') sendMessage()" oninput="fetchGoogleSuggestions(this.value)">
            <button id="send-btn" class="send-btn" onclick="sendMessage()">🚀</button>
        </div>
    </div>

    <script>
        // 1. Firebase & API Setup
        const f1 = "AIzaSyCtn"; const f2 = "6o2he56DMgd"; const f3 = "s5SsawXyHEd"; const f4 = "V8VQWGCs";
        const firebaseConfig = { apiKey: f1+f2+f3+f4, authDomain: "jee-neet-tutor.firebaseapp.com", projectId: "jee-neet-tutor", storageBucket: "jee-neet-tutor.firebasestorage.app", messagingSenderId: "64229241153", appId: "1:64229241153:web:d59a449065caf9eaa0b1c0" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const keysPool = [
            { p1: "AIzaSyB", p2: "yzZaiiVg", p3: "yATWNyAi", p4: "TVNUYzh4cLw-dEow", blockedUntil: 0 }, 
            { p1: "AIzaSyA", p2: "UG5mT6me", p3: "bAZoJW5C", p4: "k8kaiYf7LT6gdb7Q", blockedUntil: 0 }, 
            { p1: "AIzaSyD", p2: "lBCVSzL1", p3: "r7zvnHy9", p4: "j9q_dszLCGoch6Oo", blockedUntil: 0 }, 
            { p1: "AIzaSyA", p2: "uwUMUj_a", p3: "8ZotmpRt", p4: "TcX2hSi9LzUob4g8", blockedUntil: 0 }, 
            { p1: "AIzaSyD", p2: "Bst6e5Ug", p3: "WrCsItjE", p4: "JhuFT1SXNgrvBq8c", blockedUntil: 0 }, 
            { p1: "AIzaSyA", p2: "tK4EuvVt", p3: "ZA_axqqo", p4: "1nvSat0YEvL_35AE", blockedUntil: 0 }, 
            { p1: "AIzaSyB", p2: "uCIM_HxG", p3: "dsRJWWtO", p4: "HNd2BFG8tIJRcfRM", blockedUntil: 0 }  
        ];

        function getHealthyKey() {
            const now = Date.now();
            let healthyOnes = keysPool.filter(k => k.blockedUntil < now);
            if (healthyOnes.length === 0) return null;
            let pick = healthyOnes[Math.floor(Math.random() * healthyOnes.length)];
            return { key: pick.p1 + pick.p2 + pick.p3 + pick.p4, original: pick };
        }

        // 🧠 Live Google Auto-Suggest (JSONP Trick)
        function fetchGoogleSuggestions(val) {
            const box = document.getElementById('suggestions-box');
            if (!val.trim()) { box.style.display = 'none'; return; }

            // Purana script tag hatao
            const oldScript = document.getElementById('jsonp-suggest');
            if (oldScript) oldScript.remove();

            // Naya script tag banao jo Google ki API ko call karega
            const script = document.createElement('script');
            script.id = 'jsonp-suggest';
            // Google API URL with JSONP callback
            script.src = `https://suggestqueries.google.com/complete/search?client=youtube&q=${encodeURIComponent(val)}&jsonp=processGoogleSuggestions`;
            document.body.appendChild(script);
        }

        // Ye function Google API se data aane ke baad chalega
        window.processGoogleSuggestions = function(data) {
            const box = document.getElementById('suggestions-box');
            box.innerHTML = '';
            
            // data[1] mein saari suggestions hoti hain array ke form mein
            const suggestions = data[1]; 
            
            if (!suggestions || suggestions.length === 0) { 
                box.style.display = 'none'; 
                return; 
            }

            // Top 5 suggestions dikhao
            suggestions.slice(0, 5).forEach(item => {
                const text = Array.isArray(item) ? item[0] : item; // API format handle karne ke liye
                const div = document.createElement('div');
                div.className = 'suggestion-item';
                div.innerHTML = `🔍 ${text}`;
                div.onclick = () => {
                    document.getElementById('user-input').value = text;
                    box.style.display = 'none';
                    document.getElementById('user-input').focus(); 
                };
                box.appendChild(div);
            });
            box.style.display = 'block';
        }

        // 2. Auth Logic
        let currentUser = null;
        let isLoginMode = true;
        let currentSessionId = null;

        auth.onAuthStateChanged(user => {
            const histBtn = document.getElementById('btn-history');
            const setBtn = document.getElementById('btn-settings');
            if (user && user.emailVerified) {
                currentUser = user;
                histBtn.style.display = 'block';
                setBtn.style.display = 'block';
                startNewChat(); loadHistory();
            } else {
                currentUser = null;
                histBtn.style.display = 'none';
                setBtn.style.display = 'none';
                document.getElementById('auth-screen').style.display = 'flex';
                document.getElementById('chat-screen').style.display = 'none';
            }
        });

        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? "Welcome Back! 👨‍🎓" : "Join Us! ✨";
            document.getElementById('toggle-text').innerHTML = isLoginMode ? "New student? <span style='color: var(--primary);'>Sign Up</span>" : "Have account? <span style='color: var(--primary);'>Login</span>";
            document.getElementById('auth-submit-btn').innerText = isLoginMode ? "Login ⚡" : "Sign Up 🚀";
            ['auth-name', 'auth-phone'].forEach(id => document.getElementById(id).style.display = isLoginMode ? 'none' : 'block');
        }

        async function handleAuth() {
            const [n, p, e, ps] = ['auth-name', 'auth-phone', 'auth-email', 'auth-password'].map(id => document.getElementById(id).value.trim());
            const errBox = document.getElementById('auth-error');
            try {
                if (isLoginMode) {
                    const res = await auth.signInWithEmailAndPassword(e, ps);
                    if (!res.user.emailVerified) { await auth.signOut(); throw new Error("Email verify kijiye! Inbox check karein."); }
                } else {
                    if(!n || !p) throw new Error("Poori details bhariye!");
                    const res = await auth.createUserWithEmailAndPassword(e, ps);
                    await res.user.updateProfile({ displayName: n });
                    await db.collection('users').doc(res.user.uid).set({ name: n, phone: p, email: e, joinedAt: firebase.firestore.FieldValue.serverTimestamp() });
                    await res.user.sendEmailVerification(); await auth.signOut();
                    alert("Verification link sent! Verify karke login karein."); toggleAuthMode();
                }
            } catch (err) { errBox.innerText = err.message; errBox.style.display = 'block'; }
        }

        // 3. UI Interaction Logic
        function toggleMenu() {
            const menu = document.getElementById('menu-popup');
            const overlay = document.getElementById('menu-overlay');
            menu.classList.toggle('active');
            overlay.style.display = menu.classList.contains('active') ? 'block' : 'none';
        }

        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            const ov = document.getElementById('overlay');
            sb.classList.toggle('open');
            ov.style.display = sb.classList.contains('open') ? 'block' : 'none';
        }

        async function handleLogout() { if(confirm("Logout karein?")) { toggleMenu(); await auth.signOut(); } }

        function startNewChat() {
            currentSessionId = "sess_" + Date.now();
            document.getElementById('chat-box').innerHTML = '';
            appendMessage('ai-msg', `👋 Hello <b style="color:var(--primary);">${currentUser.displayName || 'Student'}</b>! Naya session shuru ho gaya hai. Puchiye apna doubt! 🎯`, true);
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';
        }

        // 4. Voice Logic
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;
        let isRecording = false;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.lang = 'en-IN';
            recognition.onstart = () => { isRecording = true; document.getElementById('mic-btn').classList.add('recording'); };
            recognition.onresult = (e) => { 
                const text = e.results[0][0].transcript;
                document.getElementById('user-input').value += text; 
                fetchGoogleSuggestions(document.getElementById('user-input').value); 
            };
            recognition.onend = () => { isRecording = false; document.getElementById('mic-btn').classList.remove('recording'); };
        }

        function toggleMic() {
            if (!recognition) return alert("Browser Mic support nahi karta.");
            isRecording ? recognition.stop() : recognition.start();
        }

        // 5. History & Message Logic
        async function loadHistory() {
            const list = document.getElementById('history-list');
            db.collection('users').doc(currentUser.uid).collection('sessions').orderBy('timestamp', 'desc').onSnapshot(snap => {
                list.innerHTML = '';
                snap.forEach(doc => {
                    if (doc.data().hidden) return;
                    const item = document.createElement('div'); item.className = 'history-item';
                    item.innerHTML = `<span onclick="loadSession('${doc.id}')">📚 ${doc.data().title.substring(0, 18)}...</span><span onclick="hideSession('${doc.id}')" style="color:#ff4444;">🗑️</span>`;
                    list.appendChild(item);
                });
            });
        }

        async function loadSession(id) {
            currentSessionId = id; const chatBox = document.getElementById('chat-box'); chatBox.innerHTML = '⌛ Loading...';
            toggleSidebar();
            const snap = await db.collection('users').doc(currentUser.uid).collection('sessions').doc(id).collection('messages').orderBy('timestamp').get();
            chatBox.innerHTML = ''; snap.forEach(doc => appendMessage(doc.data().sender === 'user' ? 'user-msg' : 'ai-msg', doc.data().text, false));
        }

        async function hideSession(id) { if(confirm("Chat hatayein?")) { await db.collection('users').doc(currentUser.uid).collection('sessions').doc(id).update({ hidden: true }); if(currentSessionId === id) startNewChat(); } }

        function appendMessage(type, text, isHtml = false) {
            const chatBox = document.getElementById('chat-box'); const div = document.createElement('div');
            div.className = `message ${type}`;
            div.innerHTML = (type === 'ai-msg' && !isHtml) ? marked.parse(text) : text;
            if(type === 'user-msg') div.innerText = text;
            chatBox.appendChild(div); chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
            if(type === 'ai-msg' && !isHtml) MathJax.typesetPromise([div]);
            return div;
        }

        // ⏳ Anti-Spam Timer
        let isCooldown = false;

        async function sendMessage() {
            if (isCooldown) {
                const input = document.getElementById('user-input');
                const oldPlaceholder = input.placeholder;
                input.placeholder = "⏳ Wait 5s...";
                input.value = "";
                setTimeout(() => input.placeholder = oldPlaceholder, 2000);
                return;
            }

            const input = document.getElementById('user-input'); const text = input.value.trim();
            if(!text || !currentUser) return;
            
            // 5 Seconds Cooldown Lock
            isCooldown = true;
            const sendBtn = document.getElementById('send-btn');
            sendBtn.style.opacity = '0.4';
            setTimeout(() => {
                isCooldown = false;
                sendBtn.style.opacity = '1';
            }, 5000);

            // Hide suggestions on send
            document.getElementById('suggestions-box').style.display = 'none'; 
            
            const sessRef = db.collection('users').doc(currentUser.uid).collection('sessions').doc(currentSessionId);
            if(!(await sessRef.get()).exists) await sessRef.set({ title: text, timestamp: firebase.firestore.FieldValue.serverTimestamp(), hidden: false });
            appendMessage('user-msg', text); input.value = '';
            const loading = appendMessage('ai-msg', `<div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`, true);
            const healthy = getHealthyKey();
            if(!healthy) { loading.innerHTML = "❌ Keys limit full. Baad mein try karein."; return; }

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${healthy.key}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{text: "Expert JEE/NEET tutor. Format math strictly with $$. Query: " + text}] }] })
                });
                const data = await res.json();
                if (!res.ok) {
                    if (res.status === 429) healthy.original.blockedUntil = Date.now() + (4 * 60 * 60 * 1000);
                    throw new Error("API Limit reached.");
                }
                const aiText = data.candidates[0].content.parts[0].text;
                loading.innerHTML = marked.parse(aiText); MathJax.typesetPromise([loading]);
                await sessRef.collection('messages').add({ text, sender: 'user', timestamp: firebase.firestore.FieldValue.serverTimestamp() });
                await sessRef.collection('messages').add({ text: aiText, sender: 'ai', timestamp: firebase.firestore.FieldValue.serverTimestamp() });
            } catch (e) { loading.innerHTML = "❌ Error: " + e.message; }
        }
    </script>
</body>
</html>
