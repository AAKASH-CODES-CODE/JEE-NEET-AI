<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎓 JEE/NEET AI Tutor - Master Pro Max</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#080b14">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        window.MathJax = { tex: { inlineMath: [['$', '$']], displayMath: [['$$', '$$']] }, startup: { typeset: false } };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        :root {
            --primary: #00c6ff;
            --primary-glow: rgba(0, 198, 255, 0.25);
            --primary-dark: #0072ff;
            --bg: #080b14;
            --bg2: #0d1120;
            --surface: rgba(18, 22, 38, 0.9);
            --surface-solid: #121626;
            --surface2: rgba(255,255,255,0.04);
            --border: rgba(255,255,255,0.08);
            --border-glow: rgba(0, 198, 255, 0.3);
            --text: #e8eaf0;
            --text-muted: #8892a4;
            --input-bg: rgba(255,255,255,0.05);
            --red: #ff4d6d;
            --green: #00e5a0;
            --user-bubble: linear-gradient(135deg, #0072ff, #00c6ff);
            --ai-bubble: rgba(255,255,255,0.045);
        }

        *, *::before, *::after { box-sizing: border-box; }

        html, body {
            height: 100%; margin: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 50% at 20% 10%, rgba(0, 198, 255, 0.07) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 80% 80%, rgba(0, 114, 255, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse 50% 60% at 50% 50%, rgba(124, 58, 237, 0.04) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        #header {
            background: var(--surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 13px 18px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            position: relative;
        }
        #header::after {
            content: '';
            position: absolute;
            bottom: -1px; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            opacity: 0.4;
        }

        .header-title {
            font-weight: 800;
            font-size: 16px;
            background: linear-gradient(135deg, #fff 0%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.3px;
        }

        .btn-small {
            padding: 8px 14px;
            border-radius: 10px;
            border: 1px solid var(--border);
            font-size: 12px;
            cursor: pointer;
            font-weight: 700;
            color: var(--text);
            display: none;
            transition: all 0.25s;
            background: var(--surface2);
            backdrop-filter: blur(10px);
        }
        .btn-small:hover { border-color: var(--primary); color: var(--primary); }

        .settings-top-btn {
            background: transparent;
            border: none;
            font-size: 22px;
            cursor: pointer;
            color: white;
            display: none;
            padding: 0;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .settings-top-btn:hover { transform: rotate(45deg); }

        #sidebar {
            position: fixed;
            left: -290px;
            top: 0;
            width: 290px;
            height: 100%;
            background: rgba(10, 13, 26, 0.97);
            backdrop-filter: blur(20px);
            z-index: 1000;
            transition: left 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }
        #sidebar.open { left: 0; }

        .sidebar-header {
            padding: 20px 18px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-list { flex: 1; overflow-y: auto; padding: 10px; }
        .history-item {
            padding: 12px 14px;
            border-radius: 12px;
            background: var(--surface2);
            margin-bottom: 8px;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid transparent;
            color: var(--text-muted);
        }
        .history-item:hover { border-color: var(--border-glow); color: var(--text); }

        .screen { display: none; flex: 1; flex-direction: column; overflow: hidden; position: relative; z-index: 1; }
        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }

        .message {
            padding: 14px 17px;
            border-radius: 20px;
            max-width: 88%;
            font-size: 14.5px;
            line-height: 1.65;
            word-wrap: break-word;
            animation: slideUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            position: relative;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(14px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .user-msg { background: var(--user-bubble); align-self: flex-end; border-bottom-right-radius: 5px; color: #fff; }
        .ai-msg { background: var(--ai-bubble); align-self: flex-start; border-bottom-left-radius: 5px; border: 1px solid var(--border); backdrop-filter: blur(10px); }

        .suggestions-box {
            display: none;
            position: absolute;
            bottom: 82px;
            left: 12px;
            right: 12px;
            background: rgba(12, 16, 28, 0.97);
            border: 1px solid var(--border);
            border-radius: 16px;
            max-height: 210px;
            overflow-y: auto;
            z-index: 50;
            box-shadow: 0 -8px 30px rgba(0,0,0,0.6);
            backdrop-filter: blur(20px);
        }
        .suggestion-item { padding: 12px 15px; border-bottom: 1px solid var(--border); color: var(--text-muted); font-size: 13.5px; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .suggestion-item:hover { background: rgba(0,198,255,0.07); color: var(--primary); }

        #input-area { background: var(--surface); backdrop-filter: blur(20px); padding: 12px 14px; display: flex; gap: 8px; border-top: 1px solid var(--border); align-items: center; z-index: 60; }
        #user-input { flex: 1; padding: 13px 16px; border-radius: 28px; border: 1px solid var(--border); background: var(--input-bg); color: white; outline: none; font-size: 14px; }

        .engine-switch-btn { background: rgba(255,255,255,0.05); color: #ff6b6b; border: 1px solid var(--border); border-radius: 22px; padding: 0 12px; height: 46px; font-size: 12px; font-weight: 700; cursor: pointer; }

        .send-btn { background: linear-gradient(135deg, #0072ff, #00c6ff); border: none; border-radius: 50%; width: 46px; height: 46px; color: white; cursor: pointer; display: flex; justify-content: center; align-items: center; box-shadow: 0 3px 15px rgba(0,198,255,0.3); flex-shrink: 0; }
        .mic-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 50%; width: 46px; height: 46px; color: white; cursor: pointer; display: flex; justify-content: center; align-items: center; flex-shrink: 0; }
        .mic-btn.recording { border-color: var(--red); animation: pulse 1.5s infinite; color: var(--red); }

        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 77, 109, 0.5); } 70% { box-shadow: 0 0 0 10px rgba(255, 77, 109, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 77, 109, 0); } }

        #menu-popup { position: fixed; top: -420px; right: 12px; width: 290px; background: rgba(10, 14, 26, 0.98); border-radius: 18px; padding: 20px; z-index: 1001; transition: all 0.4s; border: 1px solid var(--border); opacity: 0; }
        #menu-popup.active { top: 62px; opacity: 1; }

        .auth-box { background: rgba(15, 19, 35, 0.9); padding: 36px 30px; border-radius: 26px; width: 88%; max-width: 380px; text-align: center; border: 1px solid var(--border); }
        .input-field { width: 100%; padding: 14px 16px; margin: 8px 0; border-radius: 14px; border: 1px solid var(--border); background: var(--input-bg); color: white; outline: none; }
        .auth-btn { width: 100%; padding: 15px; background: linear-gradient(135deg, #0072ff, #00c6ff); color: white; border: none; border-radius: 14px; font-weight: 700; cursor: pointer; margin-top: 12px; }

        .copy-btn { position: absolute; bottom: 6px; right: 8px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); color: var(--text-muted); font-size: 10px; cursor: pointer; padding: 3px 8px; border-radius: 6px; font-weight: 700; }
        .typing-dots { display: flex; gap: 5px; padding: 5px 2px; }
        .dot { width: 8px; height: 8px; background: var(--primary); border-radius: 50%; animation: bounce 1.4s infinite; }
        .dot:nth-child(2) { animation-delay: 0.2s; } .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0.5); opacity: 0.3; } 40% { transform: scale(1); opacity: 1; } }

        #overlay, #menu-overlay { display: none; position: fixed; inset: 0; z-index: 900; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="sidebar-header"><strong>📂 Chat History</strong><button class="btn-small history-btn" style="display:block;" onclick="toggleSidebar()">✕ Close</button></div>
        <button class="auth-btn" style="margin:12px; width:auto;" onclick="startNewChat()">＋ New Chat</button>
        <div id="history-list" class="history-list"></div>
    </div>
    <div id="overlay" onclick="toggleSidebar()"></div>
    <div id="menu-overlay" onclick="toggleMenu()"></div>

    <div id="header">
        <button id="btn-history" class="btn-small history-btn" onclick="toggleSidebar()">📂 History</button>
        <span class="header-title">🎓 AI Tutor 🚀</span>
        <button id="btn-settings" class="settings-top-btn" onclick="toggleMenu()">⚙️</button>
    </div>

    <div id="menu-popup">
        <span style="color:var(--primary); font-weight:bold;">ℹ️ About</span>
        <div style="background:var(--surface2); padding:10px; border-radius:10px; font-size:12px; margin:10px 0;">Developer: Aakash<br>Motive: JEE/NEET Help 🎯</div>
        <button class="logout-menu-btn" style="width:100%; padding:10px; background:var(--red); color:white; border:none; border-radius:10px;" onclick="handleLogout()">Logout Account 🚪</button>
    </div>

    <div id="auth-screen" class="screen">
        <div class="auth-box">
            <h2>Welcome Back!</h2>
            <input type="text" id="auth-name" class="input-field" placeholder="👤 Full Name" style="display:none;">
            <input type="email" id="auth-email" class="input-field" placeholder="📧 Email ID">
            <div style="position:relative;">
                <input type="password" id="auth-password" class="input-field" placeholder="🔑 Password">
                <span onclick="togglePassword()" style="position:absolute; right:15px; top:50%; transform:translateY(-50%); cursor:pointer;">👁️</span>
            </div>
            <button id="auth-submit-btn" class="auth-btn" onclick="handleAuth()">Login ⚡</button>
            <p onclick="toggleAuthMode()" id="toggle-text" style="font-size:12px; cursor:pointer; color:#aaa; margin-top:15px;">New student? <span style="color:var(--primary);">Sign Up</span></p>
        </div>
    </div>

    <div id="chat-screen" class="screen">
        <div id="chat-box"></div>
        <div id="suggestions-box" class="suggestions-box"></div>
        <div id="input-area">
            <button id="mic-btn" class="mic-btn" onclick="toggleMic()">🎤</button>
            <input type="text" id="user-input" placeholder="✍️ Ask a doubt..." onkeypress="if(event.key==='Enter') sendMessage()" oninput="fetchGoogleSuggestions(this.value)">
            <button class="send-btn" onclick="sendMessage()">🚀</button>
        </div>
    </div>

    <script>
        // 1. Firebase Setup
        const firebaseConfig = { apiKey: "AIzaSyCtn6o2he56DMgds5SsawXyHEdV8VQWGCs", authDomain: "jee-neet-tutor.firebaseapp.com", projectId: "jee-neet-tutor", storageBucket: "jee-neet-tutor.firebasestorage.app", messagingSenderId: "64229241153", appId: "1:64229241153:web:d59a449065caf9eaa0b1c0" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(); const db = firebase.firestore();

        let currentUser = null; let isLoginMode = true; let currentSessionId = null; let currentChatContext = [];

        auth.onAuthStateChanged(user => {
            if (user && user.emailVerified) {
                currentUser = user; startNewChat(); loadHistory();
                document.getElementById('btn-history').style.display = 'block';
                document.getElementById('btn-settings').style.display = 'block';
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
                document.getElementById('chat-screen').style.display = 'none';
            }
        });

        // 2. Auth & UI Logic
        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-submit-btn').innerText = isLoginMode ? "Login ⚡" : "Sign Up 🚀";
            document.getElementById('auth-name').style.display = isLoginMode ? 'none' : 'block';
        }

        async function handleAuth() {
            const [n, e, ps] = ['auth-name', 'auth-email', 'auth-password'].map(id => document.getElementById(id).value.trim());
            try {
                if (isLoginMode) { await auth.signInWithEmailAndPassword(e, ps); } 
                else { 
                    const res = await auth.createUserWithEmailAndPassword(e, ps);
                    await res.user.updateProfile({ displayName: n });
                    await res.user.sendEmailVerification();
                    alert("Verify email then login!");
                }
            } catch (err) { alert(err.message); }
        }

        function togglePassword() {
            const p = document.getElementById('auth-password');
            p.type = p.type === 'password' ? 'text' : 'password';
        }

        function toggleSidebar() { 
            const s = document.getElementById('sidebar'); s.classList.toggle('open');
            document.getElementById('overlay').style.display = s.classList.contains('open') ? 'block' : 'none';
        }

        function toggleMenu() {
            const m = document.getElementById('menu-popup'); m.classList.toggle('active');
            document.getElementById('menu-overlay').style.display = m.classList.contains('active') ? 'block' : 'none';
        }

        function startNewChat() {
            currentSessionId = "sess_" + Date.now(); currentChatContext = [];
            document.getElementById('chat-box').innerHTML = '';
            appendMessage('ai-msg', `👋 Welcome **${currentUser.displayName || 'Student'}**! Ask me any JEE/NEET doubt.`, true);
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';
        }

        // 3. Core Chat Function (Vercel Backend Connected)
        let isCooldown = false;

        async function sendMessage() {
            if (isCooldown) return;
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if (!text || !currentUser) return;

            isCooldown = true;
            let timeLeft = 5;
            input.value = '';
            input.placeholder = `⏳ Wait ${timeLeft}s...`;

            const timer = setInterval(() => {
                timeLeft--;
                if(timeLeft > 0) input.placeholder = `⏳ Wait ${timeLeft}s...`;
                else { clearInterval(timer); isCooldown = false; input.placeholder = "✍️ Ask a doubt..."; }
            }, 1000);

            // Save session title if new
            const sessRef = db.collection('users').doc(currentUser.uid).collection('sessions').doc(currentSessionId);
            const doc = await sessRef.get();
            if(!doc.exists) await sessRef.set({ title: text, timestamp: firebase.firestore.FieldValue.serverTimestamp(), hidden: false });

            appendMessage('user-msg', text);
            const loading = appendMessage('ai-msg', `<div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`, true);

            try {
                // 🔥 API CALL TO YOUR VERCEL BACKEND
                const response = await fetch("https://jee-neet-ai.vercel.app/api/chat", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: text })
                });

                const data = await response.json();

                if (data.success) {
                    const aiText = data.answer;
                    loading.innerHTML = marked.parse(aiText);
                    addCopyButton(loading, aiText);
                    MathJax.typesetPromise([loading]);

                    // Save to Firebase
                    await sessRef.collection('messages').add({ text, sender: 'user', timestamp: firebase.firestore.FieldValue.serverTimestamp() });
                    await sessRef.collection('messages').add({ text: aiText, sender: 'ai', timestamp: firebase.firestore.FieldValue.serverTimestamp() });
                } else {
                    throw new Error(data.error || "Server Busy");
                }
            } catch (e) {
                loading.innerHTML = `<span style="color:var(--red);">❌ Error: ${e.message}</span>`;
            }
        }

        function appendMessage(type, text, isHtml = false) {
            const chatBox = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = `message ${type}`;
            if (type === 'user-msg') div.innerText = text;
            else if (isHtml) div.innerHTML = text;
            else div.innerHTML = marked.parse(text);

            if (!isHtml) addCopyButton(div, text);
            chatBox.appendChild(div);
            chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
            return div;
        }

        function addCopyButton(el, text) {
            el.style.paddingBottom = '30px';
            const btn = document.createElement('button');
            btn.className = 'copy-btn'; btn.innerText = '📋 Copy';
            btn.onclick = () => {
                navigator.clipboard.writeText(text);
                btn.innerText = '✅ Copied';
                setTimeout(() => btn.innerText = '📋 Copy', 2000);
            };
            el.appendChild(btn);
        }

        // 4. Utils
        async function loadHistory() {
            db.collection('users').doc(currentUser.uid).collection('sessions').orderBy('timestamp', 'desc').onSnapshot(snap => {
                const list = document.getElementById('history-list'); list.innerHTML = '';
                snap.forEach(doc => {
                    if (doc.data().hidden) return;
                    const div = document.createElement('div'); div.className = 'history-item';
                    div.innerHTML = `<span onclick="loadSession('${doc.id}')">📚 ${doc.data().title.substring(0,20)}...</span>`;
                    list.appendChild(div);
                });
            });
        }

        function fetchGoogleSuggestions(val) {
            if (!val.trim()) return;
            const s = document.createElement('script');
            s.src = `https://suggestqueries.google.com/complete/search?client=youtube&q=${encodeURIComponent(val)}&jsonp=showSug`;
            document.body.appendChild(s);
        }
        window.showSug = function(data) {
            const box = document.getElementById('suggestions-box'); box.innerHTML = '';
            if(!data[1].length) { box.style.display='none'; return; }
            data[1].slice(0,5).forEach(s => {
                const d = document.createElement('div'); d.className='suggestion-item'; d.innerText=s[0];
                d.onclick=()=>{ document.getElementById('user-input').value=s[0]; box.style.display='none'; };
                box.appendChild(d);
            });
            box.style.display='block';
        };
    </script>
</body>
</html>
