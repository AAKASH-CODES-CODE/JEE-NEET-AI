<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎓 JEE/NEET AI Tutor - Premium Memory</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']] },
            startup: { typeset: false }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        :root { --primary: #0b93f6; --bg: #0a0a0c; --surface: #161618; --text: #f0f0f0; --input-bg: #222225; }
        html, body { height: 100%; margin: 0; overflow: hidden; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; scroll-behavior: smooth; }
        
        #header { background: var(--surface); padding: 18px; text-align: center; font-size: 22px; font-weight: 800; border-bottom: 1px solid #2a2a2a; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 10; }
        .screen { display: none; flex: 1; flex-direction: column; height: 100%; overflow: hidden; animation: fadeIn 0.6s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        
        /* 🔐 Auth UI */
        #auth-screen { display: flex; justify-content: center; align-items: center; }
        .auth-box { background: var(--surface); padding: 35px; border-radius: 24px; width: 85%; max-width: 360px; text-align: center; border: 1px solid #2a2a2a; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .input-field { width: 100%; padding: 15px; margin: 12px 0; border-radius: 14px; border: 1px solid #444; background: var(--input-bg); color: white; box-sizing: border-box; outline: none; font-size: 15px; }
        .auth-btn { width: 100%; padding: 15px; background: linear-gradient(135deg, #0b93f6, #0066cc); color: white; border: none; border-radius: 14px; font-weight: bold; font-size: 16px; cursor: pointer; transition: transform 0.2s; }
        .auth-btn:active { transform: scale(0.96); }
        
        /* 💬 Chat UI */
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 18px; background: var(--bg); scroll-behavior: smooth; }
        .message { padding: 15px 20px; border-radius: 20px; max-width: 85%; font-size: 15.5px; line-height: 1.6; word-wrap: break-word; animation: slideUp 0.4s cubic-bezier(0.25, 0.8, 0.25, 1) forwards; opacity: 0; transform: translateY(20px); }
        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }
        .user-msg { background: linear-gradient(135deg, #0b93f6, #0077e6); align-self: flex-end; border-bottom-right-radius: 4px; color: #fff; }
        .ai-msg { background: var(--surface); align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid #2a2a2a; color: #e0e0e0; }
        
        /* ⌨️ Typing Indicator */
        .typing-dots { display: flex; gap: 4px; padding: 5px; align-items: center; }
        .dot { width: 8px; height: 8px; background-color: #888; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); background-color: var(--primary); } }

        #input-area { background: var(--surface); padding: 15px 20px; display: flex; gap: 12px; border-top: 1px solid #2a2a2a; }
        #user-input { flex: 1; padding: 15px 20px; border-radius: 30px; border: 1px solid #333; background: var(--input-bg); color: white; outline: none; }
        .send-btn { background: linear-gradient(135deg, #0b93f6, #0066cc); color: white; border: none; border-radius: 50%; width: 50px; height: 50px; cursor: pointer; font-size: 22px; }
    </style>
</head>
<body>
    <div id="header">🎓 JEE & NEET AI Tutor 🚀</div>

    <div id="auth-screen" class="screen" style="display: flex;">
        <div class="auth-box">
            <h2>Welcome! 👨‍🎓</h2>
            <input type="email" id="auth-email" class="input-field" placeholder="📧 Email ID">
            <input type="password" id="auth-password" class="input-field" placeholder="🔑 Password">
            <button class="auth-btn" onclick="handleAuth()">Login ⚡</button>
            <p onclick="toggleAuth()" id="toggle-text" style="font-size: 13px; margin-top: 15px; cursor: pointer; color: #aaa;">New student? <span style="color: #0b93f6;">Sign Up</span></p>
            <p id="auth-error" style="color: #ff5555; font-size: 12px; margin-top: 10px; display: none;"></p>
        </div>
    </div>

    <div id="chat-screen" class="screen">
        <div id="chat-box"></div>
        <div id="input-area">
            <input type="text" id="user-input" placeholder="✍️ Ask a doubt..." onkeypress="if(event.key === 'Enter') sendMessage()">
            <button class="send-btn" onclick="sendMessage()">🚀</button>
        </div>
    </div>

    <script>
        // 1. Firebase Setup
        const firebaseConfig = {
            apiKey: "AIzaSyCtn6o2he56DMgds5SsawXyHEdV8VQWGCs",
            authDomain: "jee-neet-tutor.firebaseapp.com",
            projectId: "jee-neet-tutor",
            storageBucket: "jee-neet-tutor.firebasestorage.app",
            messagingSenderId: "64229241153",
            appId: "1:64229241153:web:d59a449065caf9eaa0b1c0"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        let isLoginMode = true;
        let currentUser = null;

        // 2. API Key
        const p1 = "AIzaSyD944T";
        const p2 = "b7nDw2DKYGj";
        const p3 = "FCXY0PXIRkeg";
        const p4 = "QpPd4";
        const GEMINI_API_KEY = p1 + p2 + p3 + p4;

        function toggleAuth() {
            isLoginMode = !isLoginMode;
            document.querySelector('h2').innerText = isLoginMode ? "Welcome! 👨‍🎓" : "Join Us! ✨";
            document.getElementById('toggle-text').innerHTML = isLoginMode ? "New student? <span style='color: #0b93f6;'>Sign Up</span>" : "Have account? <span style='color: #0b93f6;'>Login</span>";
        }

        async function handleAuth() {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-password').value;
            const errBox = document.getElementById('auth-error');
            try {
                const userCredential = isLoginMode ? await auth.signInWithEmailAndPassword(email, pass) : await auth.createUserWithEmailAndPassword(email, pass);
                currentUser = userCredential.user;
                showChat();
            } catch (error) { errBox.innerText = error.message; errBox.style.display = 'block'; }
        }

        // 3. Load Chat History 📂
        async function showChat() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';
            const chatBox = document.getElementById('chat-box');
            chatBox.innerHTML = '<div style="text-align:center; color:#555; font-size:12px;">⌛ Loading Memory...</div>';
            
            try {
                const snapshot = await db.collection('chats').doc(currentUser.uid).collection('messages').orderBy('timestamp').get();
                chatBox.innerHTML = '';
                snapshot.forEach(doc => {
                    appendMessage(doc.data().sender === 'user' ? 'user-msg' : 'ai-msg', doc.data().text, false);
                });
                if(snapshot.empty) appendMessage('ai-msg', "👋 Hello! I am your AI Tutor. Let's solve some doubts! 🎯", true);
            } catch(e) { 
                chatBox.innerHTML = '';
                appendMessage('ai-msg', "⚠️ Memory load nahi ho payi (Local testing limit), par naya chat save hoga!", true); 
            }
        }

        function appendMessage(type, rawText, isHtml = false) {
            const chatBox = document.getElementById('chat-box');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${type}`;
            if(type === 'ai-msg') {
                msgDiv.innerHTML = isHtml ? rawText : marked.parse(rawText);
            } else {
                msgDiv.innerText = rawText;
            }
            chatBox.appendChild(msgDiv);
            setTimeout(() => { chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' }); }, 50);
            if(type === 'ai-msg' && !isHtml) MathJax.typesetPromise([msgDiv]);
            return msgDiv;
        }

        async function sendMessage() {
            const inputField = document.getElementById('user-input');
            const text = inputField.value.trim();
            if(!text) return;

            appendMessage('user-msg', text);
            inputField.value = '';
            
            // 💾 Save User Msg to Firestore
            try {
                await db.collection('chats').doc(currentUser.uid).collection('messages').add({
                    text: text, sender: 'user', timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
            } catch(e) {}

            const typingHtml = `<div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
            const loadingMsg = appendMessage('ai-msg', typingHtml, true);

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: "Expert JEE/NEET tutor. Use emojis. Format math with $$. Question: " + text }] }] })
                });
                const data = await response.json();
                const aiText = data.candidates[0].content.parts[0].text;
                
                loadingMsg.innerHTML = marked.parse(aiText);
                MathJax.typesetPromise([loadingMsg]);

                // 💾 Save AI Reply to Firestore
                await db.collection('chats').doc(currentUser.uid).collection('messages').add({
                    text: aiText, sender: 'ai', timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
            } catch (e) { loadingMsg.innerHTML = "❌ Error: Connection failed."; }
        }
    </script>
</body>
</html>
